<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Animation Playground</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.active {
            background: #3b82f6;
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }

        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.5;
            font-size: 1.2rem;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="controls">
        <button onclick="setMode('spark')" class="active" id="btn-spark">Spark Explosion</button>
        <button onclick="setMode('ripple')" id="btn-ripple">Water Ripple</button>
        <button onclick="setMode('trail')" id="btn-trail">Ghost Trail</button>
    </div>

    <div class="instruction">Click anywhere to see the effect</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let mode = 'spark';
        let particles = [];
        let ripples = [];
        let trail = [];

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${newMode}`).classList.add('active');
            // Clear existing effects
            particles = [];
            ripples = [];
            trail = [];
        }

        // --- Spark Logic ---
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 5 + 2;
                this.velocity = {
                    x: Math.cos(this.angle) * this.speed,
                    y: Math.sin(this.angle) * this.speed
                };
                this.life = 1;
                this.decay = Math.random() * 0.03 + 0.02;
                this.color = `hsl(${Math.random() * 60 + 200}, 100%, 70%)`; // Blue/Cyan
            }
            update() {
                this.velocity.y += 0.1; // Gravity
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.life -= this.decay;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- Ripple Logic ---
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 50;
                this.opacity = 1;
                this.speed = 2;
            }
            update() {
                this.radius += this.speed;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.strokeStyle = '#60a5fa';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        // --- Trail Logic ---
        // (Handled directly in animate loop for mouse movement)
        let mouse = { x: 0, y: 0 };
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            if (mode === 'trail') {
                trail.push({ x: mouse.x, y: mouse.y, life: 1 });
            }
        });

        document.addEventListener('click', (e) => {
            if (mode === 'spark') {
                for (let i = 0; i < 20; i++) {
                    particles.push(new Spark(e.clientX, e.clientY));
                }
            } else if (mode === 'ripple') {
                ripples.push(new Ripple(e.clientX, e.clientY));
                // Add a second smaller ripple
                setTimeout(() => ripples.push(new Ripple(e.clientX, e.clientY)), 100);
            }
            else if (mode === 'trail') {
                // Pulse effect on click for trail mode
                ripples.push(new Ripple(e.clientX, e.clientY));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Sparks
            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            // Ripples
            ripples.forEach((r, i) => {
                r.update();
                r.draw();
                if (r.opacity <= 0) ripples.splice(i, 1);
            });

            // Trail
            if (mode === 'trail') {
                // Draw connected line
                if (trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(trail[0].x, trail[0].y);
                    for (let i = 1; i < trail.length; i++) {
                        ctx.lineTo(trail[i].x, trail[i].y);
                    }
                    ctx.strokeStyle = 'rgba(96, 165, 250, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Draw fading dots
                trail.forEach((t, i) => {
                    t.life -= 0.02;
                    ctx.fillStyle = `rgba(96, 165, 250, ${t.life})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 4 * t.life, 0, Math.PI * 2);
                    ctx.fill();
                    if (t.life <= 0) trail.splice(i, 1);
                });
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
